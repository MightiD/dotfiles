[main]
font=Firacode NerdFont Mono:size=12
terminal=kitty
use-bold=yes
fields=name,keywords
layer=top
icons-enabled=yes
image-size-ratio=1

[colors]
background=1f242be1
text=8ea7ceff
input=cdd6f4ff
match=cdd6f4ff
selection=313944e1
selection-text=8da6ceff
selection-match=cdd6f4ff

[key-bindings]
next=Control+j
prev=Control+k
next-page=Control+Shift+j
prev-page=Control+Shift+k
delete-line-forward=none
