################
### MONITORS ###
################

monitor = HDMI-A-1, 1920x1080@60, 0x0, 1
monitor = DP-1, 1920x1080@60, 1920x0, 1
monitor = HDMI-A-2, 1920x1080@60, 3840x-444, 1, transform, 3

# PLUGINS
plugin {
    hyprsplit {
        num_workspaces = 10
    }
}


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = EDITOR=nvim kitty -e spf
$fileManager2 = dolphin ~
$menu = fuzzel
$browser = chromium


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = awww-daemon
exec-once = swaync
exec-once = hypridle
exec-once = hyprpm reload -n
exec-once = hyprctl dispatch focusmonitor DP-1

exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec = gsettings set org.gnome.desktop.interface gtk-theme "Breeze-Dark"


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = HYPRCURSOR_SIZE,24
env = XCURSOR_SIZE,24

env = GTK_THEME,Breeze-Dark
env = GTK_APPLICATION_PREFER_DARK_THEME,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XWAYLAND_FORCE,1

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 1
    gaps_out = 2

    border_size = 2

    col.active_border = rgb(b5cdd7)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 4
    rounding_power = 10

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = no
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
}


#############
### INPUT ###
#############

input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options = caps:escape
    kb_rules =
    numlock_by_default = true

    follow_mouse = 1

    sensitivity = 0 

    touchpad {
        natural_scroll = true
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER # Sets "Windows" key as main modifier

# GENERAL FUNCTIONS#
# Apps
bind = $mainMod, return, exec, $terminal
bind = $mainMod, tab, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod SHIFT, E, exec, $fileManager2
bind = $mainMod, R, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, m, exec, hyprlock
bind = $mainMod SHIFT, V, exec, kitty --class clipse -e 'clipse'
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT ALT, S, exec, grim -g "$(slurp)" - | swappy -f - -o - | wl-copy

# Hypr functions
bind = $mainMod, Q, killactive
bind = $mainMod, V, togglefloating
bind = $mainMod, S, layoutmsg, togglesplit
bind = $mainMod, F,fullscreen
bind = $mainMod CONTROL SHIFT, M, exit


# NAVIGATION #
# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Movement Between Workspaces
# hyprlang if HYPRSPLIT
bind = $mainMod CONTROL, k, split:workspace, r+1
bind = $mainMod CONTROL, j, split:workspace, r-1
bind = $mainMod CONTROL SHIFT, k, split:movetoworkspace, r+1
bind = $mainMod CONTROL SHIFT, j, split:movetoworkspace, r-1
# hyprlang endif

# Movement Between Monitors #
bind = $mainMod, 1, focusmonitor, HDMI-A-1
bind = $mainMod, 2, focusmonitor, DP-1
bind = $mainMod, 3, focusmonitor, HDMI-A-2

bind = $mainMod SHIFT, 1, movewindow, mon:HDMI-A-1
bind = $mainMod SHIFT, 2, movewindow, mon:DP-1
bind = $mainMod SHIFT, 3, movewindow, mon:HDMI-A-2


# RESIZE WINDOWS #
bindel = $mainMod ALT, h, resizeactive, -15 0
bindel = $mainMod ALT, l, resizeactive, 15 0
bindel = $mainMod ALT, k, resizeactive, 0 -15
bindel = $mainMod ALT, j, resizeactive, 0 15

bindel = $mainMod CONTROL ALT, h, resizeactive, -45 0
bindel = $mainMod CONTROL ALT, l, resizeactive, 45 0
bindel = $mainMod CONTROL ALT, k, resizeactive, 0 -45
bindel = $mainMod CONTROL ALT, j, resizeactive, 0 45

# Resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# HYPR XF86 FUNCTIONS #
# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from apps
windowrule = match:class *, suppress_event maximize

windowrule {
    name = kitty-startup

    match:title = Welcome
    match:class = kitty

    float = on
    size = 1000 600
    center = on
}

windowrule = match:title ^(sxiv), tile on

